version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nextosint-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nextosint}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextosint-network

  redis:
    image: redis:7-alpine
    container_name: nextosint-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextosint-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nextosint-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-nextosint}?schema=public
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - ALLOWED_ORIGIN=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-it-must-be-32-chars-long!}
      - JWT_EXPIRES_IN=24h
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Maps OSINT API keys if provided in the host shell
      - HIBP_API_KEY=${HIBP_API_KEY}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - IPINFO_TOKEN=${IPINFO_TOKEN}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - HUNTER_API_KEY=${HUNTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nextosint-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nextosint-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend
    networks:
      - nextosint-network

volumes:
  postgres_data:

networks:
  nextosint-network:
    driver: bridge
